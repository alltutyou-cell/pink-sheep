<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💕</title>
    <meta name="description" content="A sweet Valentine's Day message with adorable sheep asking the most important question!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating hearts background -->
    <div class="hearts-container">
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
    </div>

    <!-- Animated sheep -->
    <div class="sheep-container">
        <div class="sheep sheep-1">
            <img src="cute_sheep_valentine_1771071622797.png" alt="Cute sheep">
        </div>
        <div class="sheep sheep-2">
            <img src="cute_sheep_valentine_1771071622797.png" alt="Cute sheep">
        </div>
        <div class="sheep sheep-3">
            <img src="cute_sheep_valentine_1771071622797.png" alt="Cute sheep">
        </div>
        <div class="sheep sheep-4">
            <img src="cute_sheep_valentine_1771071622797.png" alt="Cute sheep">
        </div>
        <div class="sheep sheep-5">
            <img src="cute_sheep_valentine_1771071622797.png" alt="Cute sheep">
        </div>
        <div class="sheep sheep-6">
            <img src="cute_sheep_valentine_1771071622797.png" alt="Cute sheep">
        </div>
    </div>

    <!-- Main content -->
    <main class="main-content">
        <div class="content-wrapper">
            <div class="main-sheep">
                <img src="cute_sheep_valentine_1771071622797.png" alt="Valentine sheep">
            </div>
            
            <h1 class="main-title">
                Will You Be My Valentine?
            </h1>
            
            <div class="button-container">
                <button class="btn btn-yes" id="yesBtn">
                    Yes! 💕
                </button>
                <button class="btn btn-no" id="noBtn">
                    No
                </button>
            </div>
            
            <div class="message" id="message"></div>
        </div>
    </main>

    <!-- Sparkles -->
    <div class="sparkles-container">
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
